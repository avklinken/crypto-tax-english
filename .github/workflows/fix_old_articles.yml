name: Fix old blog articles

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  fix-articles:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Run fix script
        env:
          BLOG_DIR: content
        run: python fix_articles.py

      - name: Commit and push changes
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "Fix old article titles and placeholder image URLs"
          branch: main
          file_pattern: content/** *.md *.html *.txt
